<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Kindergarten at Adonai">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F4C81"/>
      <stop offset="1" stop-color="#0A2F56"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#dots)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <g fill="none" stroke="#D4AF37" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <rect x="470" y="360" width="120" height="120" fill="#0A2F56"/>
    <rect x="600" y="360" width="120" height="120" fill="#0A2F56"/>
    <rect x="535" y="240" width="120" height="120" fill="#0A2F56"/>
  </g>
  <g font-family="'Poppins',ui-sans-serif,system-ui,sans-serif" font-weight="800" fill="#D4AF37" text-anchor="middle">
    <text x="530" y="448" font-size="64">A</text>
    <text x="660" y="448" font-size="64">B</text>
    <text x="595" y="328" font-size="64">C</text>
  </g>
  <text x="600" y="640" text-anchor="middle" font-family="'Poppins',ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700" letter-spacing="3" fill="#D4AF37">EARLY YEARS</text>
  <text x="600" y="682" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="20" letter-spacing="2" fill="#ffffff" opacity="0.6">KINDERGARTEN</text>
</svg>
