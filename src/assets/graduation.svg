<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Graduation ceremony at Adonai">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F4C81"/>
      <stop offset="1" stop-color="#0A2F56"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#dots)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <g fill="none" stroke="#D4AF37" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="600,250 770,345 600,440 430,345" fill="#D4AF37" fill-opacity="0.12"/>
    <path d="M500,360 Q600,402 700,360 L672,440 Q600,470 528,440 Z" fill="#0A2F56"/>
    <path d="M770,345 L770,440"/>
    <circle cx="770" cy="455" r="13" fill="#D4AF37"/>
  </g>
  <text x="600" y="640" text-anchor="middle" font-family="'Poppins',ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700" letter-spacing="3" fill="#D4AF37">GRADUATION</text>
  <text x="600" y="682" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="20" letter-spacing="2" fill="#ffffff" opacity="0.6">CLASS OF LEAVERS</text>
</svg>
